services:
  - type: web
    name: ghost-backend
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://ghost-aleo.netlify.app
      - key: DATABASE_URL
        fromDatabase:
          name: ghost-db
          property: connectionString

databases:
  - name: ghost-db
    plan: free
    region: oregon

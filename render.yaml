services:
  - type: web
    name: ghost-backend
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://ghost-aleo.netlify.app
      - key: DATABASE_URL
        fromDatabase:
          name: ghost-db
          property: connectionString
      - key: ALEO_API_URL
        value: https://api.explorer.provable.com/v1
      - key: ALEO_PROGRAM_ID
        value: ghost_msg_019.aleo
      - key: PINATA_JWT
        sync: false
      - key: HMAC_MASTER_SECRET
        generateValue: true
      - key: VAPID_PUBLIC_KEY
        value: BPXKfsSGZVp6NVPLj1Yjc_P--BzS6UnDCA5FzSXUPXRmTDORZI5AAtt4xWO42FSaoagdM-XAJZEmw4ELiXX7YAc
      - key: VAPID_PRIVATE_KEY
        value: G5BgMrSSosvuWM175q0sYkmt9yXxpnmv7yLHbEXEXRY
      - key: VAPID_MAILTO
        value: mailto:ghost@ghost-aleo.app
      - key: SENTRY_DSN
        sync: false

databases:
  - name: ghost-db
    plan: free
    region: oregon

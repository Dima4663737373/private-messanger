services:
  - type: web
    name: ghost-backend
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://ghost-aleo.netlify.app
      - key: DATABASE_URL
        fromDatabase:
          name: ghost-db
          property: connectionString
      - key: ALEO_API_URL
        value: https://api.explorer.provable.com/v1
      - key: ALEO_PROGRAM_ID
        value: ghost_msg_018.aleo
      - key: PINATA_JWT
        sync: false
      - key: HMAC_MASTER_SECRET
        generateValue: true

databases:
  - name: ghost-db
    plan: free
    region: oregon
